<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>公共页脚</title>
    <style>
        /* 响应式基础字体设置 */
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @media (max-width: 1440px) {
            html { font-size: 15px; }
        }

        @media (max-width: 1366px) {
            html { font-size: 14px; }
        }

        @media (max-width: 1280px) {
            html { font-size: 13px; }
        }

        @media (max-width: 1024px) {
            html { font-size: 12px; }
        }

        @media (max-width: 768px) {
            html { font-size: 11px; }
        }

        @media (max-width: 600px) {
            html { font-size: 10px; }
        }

        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --klein-blue: #0051D9;
            --hermes-orange: #F37021;
            --deep-gray: #1D2129;
            --light-gray: #86909C;
            --light-bg: #F2F3F5;
            --white: #FFFFFF;
            --border: #E5E7EB;

            --font-size-base: 0.875rem;
            --line-height-base: 1.5;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.375rem;
            --spacing-md: 0.5rem;
            --spacing-lg: 0.75rem;
            --spacing-xl: 1rem;
            --spacing-2xl: 1.125rem;
            --spacing-3xl: 1.5rem;
            --spacing-4xl: 2rem;
            --spacing-5xl: 2.5rem;
        }

        body {
            background: var(--deep-gray);
            color: var(--white);
            font-family: "Microsoft Yahei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            line-height: var(--line-height-base);
        }

        /* 页脚样式 */
        footer {
            background: var(--deep-gray);
            color: var(--white);
            padding: var(--spacing-4xl) var(--spacing-xl);
            margin-top: 0;
            margin-bottom: 0;
        }

        .footer-wrap {
            max-width: 81.25rem;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(12.5rem, 1fr));
            gap: var(--spacing-4xl);
        }

        .footer-col {
            transition: transform 0.3s ease;
        }

        .footer-col:hover {
            transform: translateY(-0.3125rem);
        }

        .footer-col h3 {
            font-weight: bold;
            font-size: 1.125rem;
            margin-bottom: var(--spacing-xl);
            color: var(--white);
            position: relative;
            padding-bottom: var(--spacing-md);
        }

        .footer-col h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 2.5rem;
            height: 0.125rem;
            background: var(--hermes-orange);
        }

        .footer-col p {
            font-size: 0.875rem;
            opacity: 0.8;
            line-height: 1.8;
            color: var(--border);
        }

        .footer-col p:hover {
            opacity: 1;
        }

        /* 响应式适配 */
        @media (max-width: 1440px) {
            .footer-wrap {
                gap: 2rem;
            }
        }

        @media (max-width: 1024px) {
            .footer-wrap {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }

            .footer-col h3 {
                font-size: 1rem;
            }
        }

        @media (max-width: 768px) {
            .footer-wrap {
                gap: 1.5rem;
                padding: 0 var(--spacing-xl);
            }

            .footer-col h3 {
                font-size: 1rem;
            }

            .footer-col p {
                font-size: 0.8125rem;
            }
        }

        @media (max-width: 600px) {
            footer {
                padding: 2rem 1rem;
            }

            .footer-wrap {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }

            .footer-col h3 {
                font-size: 0.9375rem;
                margin-bottom: 0.75rem;
            }

            .footer-col p {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- 页脚 -->
    <footer>
        <div class="footer-wrap">
            <div class="footer-col">
                <h3>TECHBOT</h3>
                <p>专注工业智能 · 让制造更高效</p>
            </div>
            <div class="footer-col">
                <h3>快速入口</h3>
                <p>
                    生产力方案库<br>
                    工业设备商城<br>
                    智能知识库
                </p>
            </div>
            <div class="footer-col">
                <h3>联系我们</h3>
                <p>
                    商务合作：service@techbot.com<br>
                    服务热线：400-888-9999
                </p>
            </div>
            <div class="footer-col">
                <h3>关于我们</h3>
                <p>
                    © 2026 工业智能生产力平台<br>
                    版权所有
                </p>
            </div>
        </div>
    </footer>
</body>
</html>
