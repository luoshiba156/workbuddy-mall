<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --accent:#FF6600;--accent-light:#FF8533;--accent-bg:#FFF7F0;

  --danger:#EF4444;--danger-bg:#FEF2F2;--info:#3B82F6;--info-bg:#EFF6FF;
  --slate-50:#F8FAFC;--slate-100:#F1F5F9;--slate-200:#E2E8F0;--slate-300:#CBD5E1;
  --slate-400:#94A3B8;--slate-500:#64748B;--slate-600:#475569;--slate-700:#334155;
  --slate-800:#1E293B;--slate-900:#0F172A;
  --radius:8px;--radius-sm:4px;--radius-lg:12px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow:0 1px 2px rgba(0,0,0,.06);

html{font-size:14px}
body{font-family:'-apple-system','Segoe UI','Microsoft YaHei',sans-serif;background:var(--slate-50);color:var(--slate-800);line-height:1.5;overflow:hidden;height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
ul{list-style:none}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--slate-400)}
.app{display:flex;flex-direction:column;height:100vh}
.header{height:var(--header-h);background:#fff;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;padding:0 24px;flex-shrink:0;z-index:100;box-shadow:var(--shadow-sm)}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;color:var(--primary);white-space:nowrap}
.logo-icon{width:34px;height:34px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.logo-sub{font-size:11px;color:var(--slate-400);font-weight:400;margin-left:2px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.role-switcher{display:flex;background:var(--slate-100);border-radius:8px;padding:3px}
.role-btn{padding:6px 16px;font-size:13px;color:var(--slate-500);border-radius:6px;transition:all .2s;font-weight:500}
.role-btn.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm)}
.role-btn:hover:not(.active){color:var(--slate-700)}
.header-icon-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--slate-500);transition:all .2s;position:relative;background:none}
.header-icon-btn:hover{background:var(--slate-100);color:var(--slate-700)}
.badge-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;background:var(--accent);border-radius:50%;border:2px solid #fff}
.user-area{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .2s}
.user-area:hover{background:var(--slate-100)}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600}
.user-name{font-size:13px;font-weight:500;color:var(--slate-700)}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--slate-200);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-group{padding:8px 0}
.sidebar-group-title{font-size:11px;color:var(--slate-400);font-weight:600;text-transform:uppercase;padding:8px 22px;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 22px;font-size:13px;color:var(--slate-600);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--slate-50);color:var(--slate-800)}
.sidebar-item.active{background:var(--primary-bg);color:var(--primary);border-left-color:var(--primary);font-weight:600}
.sidebar-item .icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.sidebar-item .count{margin-left:auto;background:var(--slate-300);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.sidebar-item.active .count{background:var(--primary)}
.main{flex:1;overflow-y:auto;padding:24px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:20px;font-weight:700;color:var(--slate-900)}
.page-subtitle{font-size:13px;color:var(--slate-500);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-ghost{background:transparent;color:var(--slate-600);border:1px solid var(--slate-200)}
.btn-ghost:hover{background:var(--slate-50);border-color:var(--slate-300)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--slate-200)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;border:1px solid var(--slate-200);position:relative;overflow:hidden;transition:box-shadow .2s}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::before{background:var(--info)}
.stat-card.green::before{background:var(--success)}
.stat-card.amber::before{background:var(--warning)}
.stat-card.red::before{background:var(--danger)}
.stat-card.purple::before{background:var(--primary)}
.stat-card.cyan::before{background:var(--accent)}
.stat-label{font-size:12px;color:var(--slate-500);margin-bottom:8px}
.stat-value{font-size:26px;font-weight:700;color:var(--slate-900)}
.stat-trend{font-size:12px;margin-top:6px}
.stat-trend.up{color:var(--success)}
.stat-trend.down{color:var(--danger)}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--slate-200);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 18px;font-size:13px;color:var(--slate-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;font-weight:500}
.tab:hover{color:var(--slate-700)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab .tab-count{display:inline-block;background:var(--slate-100);color:var(--slate-500);font-size:11px;padding:1px 7px;border-radius:10px;margin-left:6px;font-weight:600}
.tab.active .tab-count{background:var(--primary-bg);color:var(--primary)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:12px 16px;background:var(--slate-50);color:var(--slate-500);font-weight:600;border-bottom:1px solid var(--slate-200);white-space:nowrap}
tbody td{padding:14px 16px;border-bottom:1px solid var(--slate-100);color:var(--slate-700)}
tbody tr{transition:background .15s}
tbody tr:hover{background:var(--slate-50)}
tbody tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;display:inline-block}
.badge-wait_pay{background:var(--warning-bg);color:#92400E}.badge-wait_pay::before{background:var(--warning)}
.badge-wait_audit{background:var(--primary-bg);color:var(--primary-dark)}.badge-wait_audit::before{background:var(--primary)}
.badge-wait_fulfill{background:var(--info-bg);color:#1E40AF}.badge-wait_fulfill::before{background:var(--info)}
.badge-fulfilling{background:var(--accent-bg);color:#9A3412}.badge-fulfilling::before{background:var(--accent)}
.badge-wait_return{background:var(--accent-bg);color:#9A3412}.badge-wait_return::before{background:var(--accent)}
.badge-completed{background:var(--success-bg);color:#065F46}.badge-completed::before{background:var(--success)}
.badge-after_sale{background:var(--danger-bg);color:#991B1B}.badge-after_sale::before{background:var(--danger)}
.badge-cancelled{background:var(--slate-100);color:var(--slate-500)}.badge-cancelled::before{background:var(--slate-400)}
.badge-closed{background:var(--slate-100);color:var(--slate-600)}.badge-closed::before{background:var(--slate-500)}
.type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.type-PHYSICAL{background:var(--info-bg);color:#1E40AF}
.type-RENTAL{background:var(--accent-bg);color:#9A3412}
.type-DIGITAL{background:var(--primary-bg);color:var(--primary-dark)}
.type-SERVICE{background:var(--success-bg);color:#065F46}
.type-RESOURCE{background:#F5F3FF;color:#5B21B6}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius-sm);padding:8px 14px;flex:1;max-width:340px;transition:border-color .2s}

.search-box input{border:none;flex:1;font-size:13px;background:transparent}
.select{padding:8px 14px;border:1px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13px;background:#fff;cursor:pointer;color:var(--slate-600)}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:40px 20px;overflow-y:auto;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:820px;box-shadow:var(--shadow-lg);transform:translateY(20px);transition:transform .25s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--slate-200)}
.modal-title{font-size:17px;font-weight:700;color:var(--slate-900)}
.modal-close{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--slate-400);transition:all .2s;font-size:20px;background:none}
.modal-close:hover{background:var(--slate-100);color:var(--slate-700)}
.modal-body{padding:24px;max-height:65vh;overflow-y:auto}
.modal-footer{padding:16px 24px;border-top:1px solid var(--slate-200);display:flex;justify-content:flex-end;gap:10px}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--slate-200)}
.timeline-item{position:relative;padding-bottom:20px}
.timeline-item:last-child{padding-bottom:0}
.timeline-dot{position:absolute;left:-28px;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--slate-300);z-index:1}
.timeline-item.done .timeline-dot{border-color:var(--success);background:var(--success)}
.timeline-item.current .timeline-dot{border-color:var(--primary);background:var(--primary);box-shadow:0 0 0 4px var(--primary-bg)}
.timeline-time{font-size:12px;color:var(--slate-400);margin-bottom:2px}
.timeline-title{font-size:13px;font-weight:600;color:var(--slate-700)}
.timeline-desc{font-size:12px;color:var(--slate-500);margin-top:2px}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.info-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.info-item{padding:12px 16px;background:var(--slate-50);border-radius:var(--radius-sm)}

.info-value{font-size:14px;font-weight:500;color:var(--slate-800)}
.section-title{font-size:14px;font-weight:700;color:var(--slate-800);margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.section-title .bar{width:3px;height:16px;background:var(--primary);border-radius:2px}
.section-title:first-child{margin-top:0}
.chart-card{padding:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-title{font-size:15px;font-weight:700;color:var(--slate-800)}
.chart-container{position:relative;height:200px}
.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.dash-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.progress-bar{height:8px;background:var(--slate-100);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .5s;background:var(--primary)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--slate-100);color:var(--slate-600)}
.checkbox{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
.pagination{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:20px;padding:0 16px 16px}
.page-btn{min-width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--slate-600);cursor:pointer;transition:all .15s;border:1px solid transparent}
.page-btn:hover{background:var(--slate-100)}
.page-btn.active{background:var(--primary);color:#fff;font-weight:600}
.page-btn.disabled{color:var(--slate-300);cursor:not-allowed}
.toast{position:fixed;bottom:24px;right:24px;background:var(--slate-800);color:#fff;padding:12px 20px;border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);font-size:13px;z-index:2000;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:1024px){.dash-grid{grid-template-columns:1fr}.dash-grid-3{grid-template-columns:1fr 1fr}.info-grid{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{display:none}.stats-grid{grid-template-columns:1fr 1fr}.dash-grid-3{grid-template-columns:1fr}}
</style>
</head>

function renderSidebar(menus){
  let html='';
  menus.forEach(g=>{
    html+=`<div class="sidebar-group"><div class="sidebar-group-title">${g.group}</div>`;
    g.items.forEach(item=>{
      const active=item.id===currentMenu?'active':'';
      const count=item.count?`<span class="count">${item.count}</span>`:'';
      html+=`<div class="sidebar-item ${active}" onclick="switchMenu('${item.id}')"><span class="icon">${item.icon}</span><span>${item.label}</span>${count}</div>`;
    });
    html+='</div>';
  });
  document.getElementById('sidebar').innerHTML=html;
}
function switchMenu(id){currentMenu=id;currentStatusFilter='all';renderSidebar(MENUS);renderMain();}
function renderMain(){
  const fn=VIEWS[currentMenu];

}
function filterStatus(s){currentStatusFilter=s;renderMain();}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function fmt(n){return '¥'+n.toLocaleString();}
function orderActions(status,role,orderId){
  let a=[`<button class="btn btn-ghost btn-sm" onclick="showOrderDetail('${orderId}')">详情</button>`];
  if(role==='merchant'){
    if(status==='WAIT_AUDIT')a.push(`<button class="btn btn-primary btn-sm" onclick="showToast('已审核通过')">审核</button>`);
    if(status==='WAIT_FULFILL')a.push(`<button class="btn btn-primary btn-sm" onclick="showToast('已标记发货')">发货</button>`);
    if(status==='AFTER_SALE')a.push(`<button class="btn btn-danger btn-sm" onclick="showToast('已跳转售后处理')">处理</button>`);
    if(status==='WAIT_RETURN')a.push(`<button class="btn btn-success btn-sm" onclick="showToast('已确认归还')">归还</button>`);
  }
  if(role==='buyer'){
    if(status==='WAIT_PAY')a.push(`<button class="btn btn-primary btn-sm" onclick="showToast('跳转支付页面')">付款</button>`);
    if(status==='FULFILLING')a.push(`<button class="btn btn-success btn-sm" onclick="showToast('已确认收货')">收货</button>`);
    if(status==='WAIT_RETURN')a.push(`<button class="btn btn-primary btn-sm" onclick="showToast('已发起归还')">归还</button>`);
    if(status==='COMPLETED')a.push(`<button class="btn btn-ghost btn-sm" onclick="showToast('已提交评价')">评价</button>`);
  }
  if(role==='platform'){
    if(status==='AFTER_SALE')a.push(`<button class="btn btn-danger btn-sm" onclick="showToast('已介入仲裁')">仲裁</button>`);
  }
  return a.join('');
}

function lineChart(){
  const data=[180,220,195,280,310,260,386],days=['6/19','6/20','6/21','6/22','6/23','6/24','6/25'],max=400,w=480,h=180,pad=30;
  const stepX=(w-pad*2)/(data.length-1);
  const pts=data.map((v,i)=>({x:pad+i*stepX,y:h-pad-(v/max)*(h-pad*2)}));
  const path=pts.map((p,i)=>(i===0?'M':'L')+p.x+' '+p.y).join(' ');
  const area=path+` L ${pts[pts.length-1].x} ${h-pad} L ${pad} ${h-pad} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4F46E5" stop-opacity="0.2"/><stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/></linearGradient></defs>
    ${[0,.25,.5,.75,1].map(t=>`<line x1="${pad}" y1="${pad+t*(h-pad*2)}" x2="${w-pad}" y2="${pad+t*(h-pad*2)}" stroke="#E2E8F0" stroke-dasharray="4 4"/>`).join('')}
    <path d="${area}" fill="url(#ag)"/><path d="${path}" fill="none" stroke="#4F46E5" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#fff" stroke="#4F46E5" stroke-width="2"/><text x="${p.x}" y="${h-pad+14}" text-anchor="middle" font-size="10" fill="#94A3B8">${days[i]}</text><text x="${p.x}" y="${p.y-8}" text-anchor="middle" font-size="10" fill="#4F46E5" font-weight="600">${data[i]}K</text>`).join('')}
  </svg>`;
}
function donutChart(){
  const data=[{label:'实物购买',value:45,color:'#3B82F6'},{label:'设备租赁',value:25,color:'#F59E0B'},{label:'技术服务',value:15,color:'#10B981'},{label:'数字产品',value:10,color:'#6366F1'},{label:'资源共享',value:5,color:'#EC4899'}];
  const total=data.reduce((s,d)=>s+d.value,0),r=60,cx=90,cy=90,sw=24,circ=2*Math.PI*r;
  let off=0;
  return `<div style="display:flex;align-items:center;gap:20px;height:100%">
    <svg viewBox="0 0 180 180" style="width:180px;height:180px;flex-shrink:0">
      ${data.map(d=>{const pct=d.value/total,dash=pct*circ,seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=dash;return seg;}).join('')}
      <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">100%</text><text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="10" fill="#94A3B8">总占比</text>
    </svg>
    <div style="display:flex;flex-direction:column;gap:8px">${data.map(d=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px"><span style="width:10px;height:10px;border-radius:3px;background:${d.color}"></span><span style="color:var(--slate-600)">${d.label}</span><span style="font-weight:600;color:var(--slate-800);margin-left:auto">${d.value}%</span></div>`).join('')}</div>

}
function barChart(){
  const data=[856,1020,780,1150,980,1258],months=['1月','2月','3月','4月','5月','6月'],max=1400,w=480,h=180,pad=30;
  const barW=(w-pad*2)/data.length*0.6,gap=(w-pad*2)/data.length;
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%">
    <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366F1"/><stop offset="100%" stop-color="#4F46E5"/></linearGradient></defs>
    ${[0,.25,.5,.75,1].map(t=>`<line x1="${pad}" y1="${pad+t*(h-pad*2)}" x2="${w-pad}" y2="${pad+t*(h-pad*2)}" stroke="#E2E8F0" stroke-dasharray="4 4"/>`).join('')}
    ${data.map((v,i)=>{const bh=(v/max)*(h-pad*2),x=pad+i*gap+(gap-barW)/2,y=h-pad-bh;return `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="4" fill="url(#bg)"/><text x="${x+barW/2}" y="${y-6}" text-anchor="middle" font-size="10" fill="#475569" font-weight="600">${v}K</text><text x="${x+barW/2}" y="${h-pad+14}" text-anchor="middle" font-size="10" fill="#94A3B8">${months[i]}</text>`;}).join('')}

// 读取URL参数 tab，决定默认选中的菜单（如 ?tab=cart 选中购物车）
(function(){
  const params = new URLSearchParams(window.location.search);
  const tab = params.get('tab');
  if(tab && MENUS.some(g => g.items.some(i => i.id === tab))){
    currentMenu = tab;
  } else {
    currentMenu = 'myOrders';
  }
})();
