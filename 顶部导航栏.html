<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>工业智能生产力平台</title>
    <style>
        .ai-page .nav-container {
            width: 94% !important;
            max-width: none !important;
        }

        /* 响应式基础字体设置 */
        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @media (max-width: 1440px) {
            html { font-size: 15px; }
        }

        @media (max-width: 1366px) {
            html { font-size: 14px; }
        }

        @media (max-width: 1280px) {
            html { font-size: 13px; }
        }

        @media (max-width: 1024px) {
            html { font-size: 12px; }
        }

        @media (max-width: 768px) {
            html { font-size: 11px; }
        }

        @media (max-width: 600px) {
            html { font-size: 10px; }
        }

        :root {
            --klein-blue: #002FA7;
            --hermes-orange: #F37021;
            --deep-gray: #1D2129;
            --light-gray: #86909C;
            --light-bg: #F2F3F5;
            --white: #FFFFFF;
            --border: #E5E7EB;

            --font-size-base: 0.75rem;
            --line-height-base: 1.5;
            --spacing-xs: 0.25rem;
            --spacing-sm: 0.375rem;
            --spacing-md: 0.5rem;
            --spacing-lg: 0.75rem;
            --spacing-xl: 1rem;
            --spacing-2xl: 1.125rem;
            --spacing-3xl: 1.5rem;
            --spacing-4xl: 2rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .top-nav {
            background: #0051D9;
            height: 3rem;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 99998;
            border-bottom: 1px solid #E8E8E8;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }

        .nav-container {
            width: 90rem;
            max-width: 100%;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-xl);
            transition: none !important;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            font-size: var(--font-size-base);
            color: #fff;
            line-height: 3rem;
        }

        .nav-right {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 1.25rem;
            font-size: var(--font-size-base);
            color: #fff;
            line-height: 3rem;
        }

        .logo-container {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }

        .logo-text {
            font-weight: 900;
            font-size: 1.6rem;
            color: #fff;
        }

        .logo-slogan {
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 0.5rem;
            color: var(--hermes-orange);
            background: linear-gradient(135deg, #F37021, #FF6B35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            color: #fff;
            text-decoration: none;
            display: inline-block;
            line-height: 3rem;
            transition: all 0.3s;
        }

        .nav-link:hover {
            color: var(--hermes-orange);
        }

        .user-name {
            color: #fff;
            font-weight: 500;
            font-size: var(--font-size-base);
            white-space: nowrap;
        }

        .logout-link {
            color: var(--hermes-orange);
            text-decoration: none;
            display: inline-block;
            line-height: 3rem;
            transition: all 0.3s;
        }

        .location-info {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            color: var(--deep-gray);
        }

        .location-icon {
            width: 0.875rem;
            height: 0.875rem;
            color: var(--hermes-orange);
            flex-shrink: 0;
        }

        .location-text {
            color: var(--hermes-orange);
        }

        .switch-city {
            color: var(--light-gray);
        }

        .message-badge {
            color: var(--hermes-orange);
            font-weight: bold;
        }

        .logged-nav {
            z-index: 99997;
        }

        @media (max-width: 1024px) {
            .nav-container {
                padding: 0 var(--spacing-lg);
            }

            .nav-left, .nav-right {
                gap: 1rem;
                font-size: 0.6875rem;
            }
        }

        @media (max-width: 768px) {
            .top-nav {
                height: 2rem;
            }

            .nav-left, .nav-right {
                gap: 0.75rem;
                font-size: 0.625rem;
            }

            .nav-container {
                padding: 0 var(--spacing-md);
            }
        }

        @media (max-width: 600px) {
            .nav-left span, .nav-right a {
                display: none;
            }

            .nav-left span:first-child {
                display: inline-block;
            }

            .nav-right a:first-child {
                display: inline-block;
            }
        }
    </style>
    <script>
        let pendingWidth = null;

        function applyNavWidth(width) {
            const navContainers = document.querySelectorAll('.nav-container');
            navContainers.forEach(container => {
                container.style.setProperty('width', width, 'important');
                container.style.setProperty('max-width', 'none', 'important');
                void container.offsetWidth;
            });
            pendingWidth = width;
        }

        // 立即执行，检查是否在ai页面
        try {
            const parentUrl = window.parent.location.href;
            if (parentUrl.includes('创造中心.html')) {
                pendingWidth = '94%';
            }
        } catch (e) {
        }

        // 检查登录状态并更新头部显示
        function updateHeader() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

            const unloggedNav = document.getElementById('unloggedNav');
            const loggedNav = document.getElementById('loggedNav');

            if (unloggedNav && loggedNav) {
                if (isLoggedIn) {
                    unloggedNav.style.display = 'none';
                    loggedNav.style.display = 'block';
                } else {
                    unloggedNav.style.display = 'block';
                    loggedNav.style.display = 'none';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateHeader();
            // 初始化时检查是否有待处理的宽度设置
            initNavWidth();

            const loginButtons = document.querySelectorAll('a[href="#"]');
            loginButtons.forEach(button => {
                if (button.textContent.trim() === '登录') {
                    button.addEventListener('click', function(e) {
                        e.preventDefault();
                        window.parent.postMessage({ type: 'SHOW_LOGIN_MODAL' }, '*');
                    });
                }
            });

            const logoutButtons = document.querySelectorAll('a[onclick="showLogoutConfirm()"]');
            logoutButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.parent.postMessage({ type: 'SHOW_LOGOUT_MODAL' }, '*');
                });
            });
        });

        function goToPersonalCenter() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (isLoggedIn) {
                window.open('个人中心.html', '_blank');
            } else {
                window.parent.postMessage({ type: 'SHOW_LOGIN_MODAL' }, '*');
            }
        }

        function goToCreateOrg() {
            window.top.location.href = '创建组织页.html';
        }

        function showLogoutConfirm() {
            window.parent.postMessage({ type: 'SHOW_LOGOUT_MODAL' }, '*');
        }

        function refreshPage() {
            // 通过postMessage通知父页面刷新
            window.parent.postMessage({ type: 'REFRESH_PAGE' }, '*');
        }

        // 初始化时检查是否有待处理的宽度设置
        function initNavWidth() {
            if (pendingWidth) {
                applyNavWidth(pendingWidth);
            }
        }

        window.addEventListener('message', (event) => {
            if (event.data.type === 'LOGIN_SUCCESS' || event.data.type === 'LOGOUT_SUCCESS') {
                updateHeader();
            } else if (event.data.type === 'UPDATE_LOGIN_STATUS') {
                const isLoggedIn = event.data.isLoggedIn;
                const unloggedNav = document.getElementById('unloggedNav');
                const loggedNav = document.getElementById('loggedNav');

                if (unloggedNav && loggedNav) {
                    if (isLoggedIn) {
                        unloggedNav.style.display = 'none';
                        loggedNav.style.display = 'block';
                    } else {
                        unloggedNav.style.display = 'block';
                        loggedNav.style.display = 'none';
                    }
                }
            } else if (event.data.type === 'SET_NAV_CONTAINER_WIDTH') {
                applyNavWidth(event.data.width);
                setTimeout(() => applyNavWidth(event.data.width), 50);
                setTimeout(() => applyNavWidth(event.data.width), 200);
            }
        });

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const currentWidth = document.querySelector('.nav-container');
                if (currentWidth && currentWidth.style.width) {
                    applyNavWidth(currentWidth.style.width);
                }
            }, 100);
        });
    </script>
    <script>
        if (window.location.search.includes('page=ai')) {
            document.addEventListener('DOMContentLoaded', function() {
                document.body.classList.add('ai-page');
            });
            if (document.body) {
                document.body.classList.add('ai-page');
            }
        }
    </script>
</head>

        </div>
    </div>

                <a href="#" onclick="goToPersonalCenter()" class="nav-link"><svg style="width:0.875rem;height:0.875rem;vertical-align:middle;margin-right:0.25rem;color:#4A90D9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>个人中心</a>

</body>
</html>
